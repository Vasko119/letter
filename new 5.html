<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хронология — Кървавото писмо</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --accent: #c0392b;
    --accent-2: #e74c3c;
    --bg: #15151f;
    --panel: #1e1e2f;
    --text: #ffffff;
    --muted: #a7a7b8;
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.1);
}
body.light {
    --bg: #f4ece1;
    --panel: #fbf6ed;
    --text: #2b1e1e;
    --muted: #6b5b5b;
    --glass: rgba(139,0,0,0.08);
    --border: rgba(139,0,0,0.2);
}

* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
}

nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(14px);
    padding: 14px 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
body.light nav { background: rgba(255,255,255,0.95); }

nav a, .nav-btn {
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 50px;
    transition: all 0.25s;
    font-size: 15px;
    background: rgba(255,255,255,0.1);
}
body.light nav a, body.light .nav-btn { background: rgba(139,0,0,0.1); }

.nav-btn:hover, nav a:hover {
    transform: translateY(-2px);
    background: rgba(192,57,43,0.35);
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px 80px;
}

h1 {
    text-align: center;
    font-size: clamp(32px, 5vw, 48px);
    margin: 0 0 40px;
    font-weight: 800;
    letter-spacing: -1px;
}
h1 span { color: var(--accent-2); }

.timeline {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
}

.timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, var(--accent), var(--accent-2));
    transform: translateX(-50%);
    border-radius: 999px;
}

.timeline-item {
    margin-bottom: 60px;
    position: relative;
    width: 45%;
}

.timeline-item:nth-child(odd) { left: 0; }
.timeline-item:nth-child(even) { left: 55%; }

.timeline-item::before {
    content: '';
    position: absolute;
    top: 18px;
    width: 18px;
    height: 18px;
    background: var(--accent-2);
    border: 4px solid var(--panel);
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(231, 76, 60, 0.25);
    z-index: 2;
}

.timeline-item:nth-child(odd)::before { right: -11px; }
.timeline-item:nth-child(even)::before { left: -11px; }

.timeline-content {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    position: relative;
    transition: transform 0.3s;
}

.timeline-content:hover {
    transform: translateY(-6px);
}

.timeline-content h3 {
    margin: 0 0 12px;
    color: var(--accent-2);
    font-size: 1.35rem;
    font-weight: 700;
}

.timeline-content p {
    margin: 0;
    color: var(--muted);
    font-size: 15.5px;
    line-height: 1.75;
}

.date-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
}

.cta {
    text-align: center;
    margin-top: 60px;
}
.cta a {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 700;
    font-size: 16px;
    transition: all 0.3s;
}
.cta a:hover {
    transform: scale(1.05);
    background: #e74c3c;
}

/* Responsive */
@media (max-width: 768px) {
    .timeline::before { left: 30px; }
    .timeline-item {
        width: 100%;
        left: 0 !important;
        margin-bottom: 50px;
    }
    .timeline-item::before {
        left: 19px !important;
    }
    .timeline-content { margin-left: 70px; }
}
</style>
</head>
<body>

<nav>
    <a href="/" data-bg="← Начало" data-en="← Home">← Начало</a>
    <a href="#map" data-bg="Карта" data-en="Map">Карта</a>
    <a href="/dashboard" data-bg="📊 Табло" data-en="📊 Dashboard">📊 Табло</a>
    <button onclick="toggleTheme()" class="nav-btn" id="themeBtn">🌙</button>
    <button class="lang-btn nav-btn active" id="langBtnBg" onclick="switchLang('bg')">🇧🇬 BG</button>
    <button class="lang-btn nav-btn" id="langBtnEn" onclick="switchLang('en')">EN</button>
</nav>

<div class="container">
    <h1 data-bg='Хронология на <span>Кървавото писмо</span>' data-en='Timeline of <span>the Bloody Letter</span>'>
        Хронология на <span>Кървавото писмо</span>
    </h1>

    <div class="timeline" id="timelineContainer"></div>

    <div class="cta">
        <a href="/" data-bg="← Обратно към началото" data-en="← Back to Home">← Обратно към началото</a>
    </div>
</div>

<script>
const safeStorage = {
    getItem(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
    setItem(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
};

let currentLang = safeStorage.getItem('aprilLang') || 'bg';
let isLightTheme = safeStorage.getItem('aprilTheme') === 'light';

const timelineEvents = [
    {
        date: "20 април 1876",
        bg: "Обявяване на Априлското въстание в Копривщица и Панагюрище",
        en: "Proclamation of the April Uprising in Koprivshtitsa and Panagyurishte"
    },
    {
        date: "21 април 1876",
        bg: "Написване и разпространение на Кървавото писмо от Тодор Каблешков",
        en: "Writing and distribution of the Bloody Letter by Todor Kableshkov"
    },
    {
        date: "Май 1876",
        bg: "Кланетата в Батак, Перущица и Клисура – символ на османските зверства",
        en: "Massacres in Batak, Perushtitsa and Klisura – symbol of Ottoman atrocities"
    },
    {
        date: "1877",
        bg: "Започване на Руско-турската освободителна война",
        en: "Start of the Russo-Turkish War of Liberation"
    },
    {
        date: "3 март 1878",
        bg: "Подписване на Санстефанския мирен договор – Освобождение на България",
        en: "Signing of the Treaty of San Stefano – Liberation of Bulgaria"
    }
];

function applyLang() {
    document.querySelectorAll('[data-bg]').forEach(el => {
        const text = currentLang === 'bg' ? el.getAttribute('data-bg') : el.getAttribute('data-en');
        if (text.includes('<')) el.innerHTML = text;
        else el.textContent = text;
    });

    document.getElementById('langBtnBg').classList.toggle('active', currentLang === 'bg');
    document.getElementById('langBtnEn').classList.toggle('active', currentLang === 'en');
}

function switchLang(lang) {
    currentLang = lang;
    safeStorage.setItem('aprilLang', lang);
    applyLang();
    renderTimeline();
}

function toggleTheme() {
    isLightTheme = !isLightTheme;
    document.body.classList.toggle('light', isLightTheme);
    document.getElementById('themeBtn').textContent = isLightTheme ? '☀️' : '🌙';
    safeStorage.setItem('aprilTheme', isLightTheme ? 'light' : 'dark');
}

function renderTimeline() {
    const container = document.getElementById('timelineContainer');
    container.innerHTML = '';

    timelineEvents.forEach((ev, index) => {
        const text = currentLang === 'bg' ? ev.bg : ev.en;
        
        const item = document.createElement('div');
        item.className = `timeline-item ${index % 2 === 0 ? 'odd' : 'even'}`;
        item.innerHTML = `
            <div class="timeline-content">
                <div class="date-badge">${ev.date}</div>
                <h3>${text}</h3>
            </div>
        `;
        container.appendChild(item);
    });
}

window.addEventListener('load', () => {
    if (isLightTheme) {
        document.body.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
    }
    applyLang();
    renderTimeline();
});
</script>
</body>
</html>
