<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло — Кървавото писмо</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --main: #8b0000;
    --accent: #c0392b;
    --accent-2: #e74c3c;
    --bg: #15151f;
    --panel: #1e1e2f;
    --text: #ffffff;
    --muted: #a7a7b8;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --nav-bg: rgba(0,0,0,0.92);
}
body.light {
    --bg: #f4ece1;
    --panel: #fbf6ed;
    --text: #2b1e1e;
    --muted: #6b5b5b;
    --glass: rgba(139,0,0,0.06);
    --border: rgba(139,0,0,0.15);
    --accent: #a52a2a;
    --nav-bg: rgba(255,255,255,0.95);
}

* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(192,57,43,0.18), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(139,0,0,0.25), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.5s, color 0.5s;
}

nav {
    position: sticky; top: 0; background: var(--nav-bg); backdrop-filter: blur(14px);
    padding: 14px 20px; z-index: 100; display: flex; align-items: center; justify-content: center;
    gap: 10px; flex-wrap: wrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
nav a, .nav-btn {
    color: var(--text); text-decoration: none; font-weight: 600; padding: 10px 18px;
    border-radius: 50px; transition: all 0.25s; font-size: 15px; border: none; cursor: pointer;
    background: rgba(255,255,255,0.10);
}
body.light nav a, body.light .nav-btn { background: rgba(139,0,0,0.10); }
.nav-btn:hover, nav a:hover { transform: translateY(-2px); background: rgba(192,57,43,0.32); }
.lang-btn.active { background: var(--accent); color: white; }

.container { max-width: 1280px; margin: auto; padding: 40px 24px 80px; }

.hero {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
    padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px;
    flex-wrap: wrap;
}
.hero h1 {
    font-size: clamp(28px, 4vw, 44px); margin: 0 0 6px; letter-spacing: -0.5px;
    font-weight: 800;
}
.hero h1 span { color: var(--accent-2); }
.hero p { margin: 0; color: var(--muted); font-size: 15px; max-width: 640px; line-height: 1.5; }
.hero .badge {
    display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px;
    background: var(--glass); border: 1px solid var(--border); border-radius: 999px;
    font-size: 13px; color: var(--muted);
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }

.kpis {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 18px; margin-bottom: 32px;
}
.kpi {
    background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
    padding: 22px; position: relative; overflow: hidden;
}
.kpi::before {
    content: ''; position: absolute; inset: 0 auto auto 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
}
.kpi .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.kpi .value { font-size: 36px; font-weight: 800; line-height: 1.1; }
.kpi .sub { margin-top: 6px; font-size: 12px; color: var(--muted); }

.grid {
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px;
}
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

.panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
    padding: 24px;
}
.panel h2 {
    margin: 0 0 18px; font-size: 18px; font-weight: 700; letter-spacing: 0.2px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.panel h2 small { color: var(--muted); font-size: 12px; font-weight: 500; }

.bar-row {
    display: grid; grid-template-columns: 150px 1fr 60px;
    align-items: center; gap: 12px; margin-bottom: 12px;
}
.bar-row .name { font-size: 14px; font-weight: 600; }
.bar-track {
    height: 12px; background: var(--glass); border-radius: 6px; overflow: hidden; position: relative;
}
.bar-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.8s cubic-bezier(.2,.9,.2,1);
    width: 0;
}
.bar-row .count { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: 13px; }

.timeline-list { margin: 0; padding: 0; list-style: none; }
.timeline-list li {
    position: relative; padding: 12px 0 12px 26px; border-bottom: 1px dashed var(--border);
    font-size: 14px;
}
.timeline-list li:last-child { border-bottom: none; }
.timeline-list li::before {
    content: ''; position: absolute; left: 4px; top: 18px; width: 10px; height: 10px;
    background: var(--accent-2); border-radius: 50%; box-shadow: 0 0 0 4px rgba(231,76,60,0.18);
}
.timeline-list li b { display: block; color: var(--accent-2); font-size: 12px; letter-spacing: 1px; margin-bottom: 4px; }

.fav-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px;
}
.fav-chip {
    background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; text-align: center; font-size: 13px; font-weight: 600;
}
.empty {
    color: var(--muted); font-size: 14px; padding: 14px; border: 1px dashed var(--border);
    border-radius: 12px; text-align: center;
}

.cta {
    margin-top: 28px; background: linear-gradient(135deg, rgba(192,57,43,0.25), rgba(139,0,0,0.25));
    border: 1px solid var(--border); border-radius: 20px; padding: 24px;
    display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
}
.cta p { margin: 0; }
.cta a {
    padding: 12px 22px; background: var(--accent); color: #fff; text-decoration: none;
    border-radius: 50px; font-weight: 700;
}

.loading {
    display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted);
    border-top-color: var(--accent-2); border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
    <a href="/" data-bg="← Начало" data-en="← Home">← Начало</a>
    <a href="/#map" data-bg="Карта" data-en="Map">Карта</a>
    <a href="/#timeline" data-bg="Хронология" data-en="Timeline">Хронология</a>
    <button onclick="toggleTheme()" class="nav-btn" id="themeBtn">🌙</button>
    <button class="lang-btn nav-btn active" id="langBtnBg" onclick="switchLang('bg')">🇧🇬 BG</button>
    <button class="lang-btn nav-btn" id="langBtnEn" onclick="switchLang('en')">EN</button>
</nav>

<div class="container">

    <div class="hero">
        <div>
            <h1 data-bg='Табло на <span>Кървавото писмо</span>' data-en='Dashboard of <span>the Bloody Letter</span>'></h1>
           
        </div>
        <div class="badge"><span class="dot"></span><span id="liveLabel" data-bg="Live данни" data-en="Live data">Live данни</span></div>
    </div>

    <div class="kpis">
        <div class="kpi">
            <div class="label" data-bg="Места" data-en="Places">Места</div>
            <div class="value" id="kpiPlaces">—</div>
            <div class="sub" data-bg="В маршрута на въстанието" data-en="On the uprising route">В маршрута на въстанието</div>
        </div>
        <div class="kpi">
            <div class="label" data-bg="Събития" data-en="Events">Събития</div>
            <div class="value" id="kpiEvents">—</div>
            <div class="sub" data-bg="В хронологията 1876–1878" data-en="On the timeline 1876–1878">В хронологията 1876–1878</div>
        </div>
        <div class="kpi">
            <div class="label" data-bg="AI прегледи" data-en="AI views">AI прегледи</div>
            <div class="value" id="kpiViews"><span class="loading"></span></div>
            <div class="sub" data-bg="Общо натискания на AI разказ" data-en="Total AI-story clicks">Общо натискания на AI разказ</div>
        </div>
       
    </div>

    <div class="grid">
        <div class="panel">
            <h2>
                <span data-bg="Най-разглеждани места" data-en="Most-viewed places">Най-разглеждани места</span>
                <small id="viewsUpdated"></small>
            </h2>
            <div id="barsContainer"></div>
        </div>

        <div class="panel">
            <h2><span data-bg="Хронология" data-en="Timeline">Хронология</span></h2>
            <ul class="timeline-list" id="timelineList"></ul>
        </div>
    </div>

    <div class="panel" style="margin-top:24px;">
        
        <div id="favContainer"></div>
    </div>

    <div class="cta">
        <p data-bg="Разгледайте картата, натиснете „AI разкажи“ върху място и вижте таблото да се актуализира."
           data-en="Explore the map, tap “AI Story” on a place and watch the dashboard update."></p>
        <a href="/" data-bg="Към сайта" data-en="Go to site">Към сайта</a>
    </div>

</div>

<script>
const safeStorage = {
    getItem(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
    setItem(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }
};

let currentLang = safeStorage.getItem('aprilLang') || 'bg';
let isLightTheme = safeStorage.getItem('aprilTheme') === 'light';

const placeInfo = {
    Panagyurishte: { bg: "Панагюрище", en: "Panagyurishte" },
    Plovdiv: { bg: "Пловдив", en: "Plovdiv" },
    Koprivshtitsa: { bg: "Копривщица", en: "Koprivshtitsa" },
    Klisura: { bg: "Клисура", en: "Klisura" },
    Strelcha: { bg: "Стрелча", en: "Strelcha" },
    Pazardzhik: { bg: "Пазарджик", en: "Pazardzhik" },
    Batak: { bg: "Батак", en: "Batak" },
    Perushtitsa: { bg: "Перущица", en: "Perushtitsa" }
};

const timelineEvents = [
    { date: "20.04.1876", bg: "Обявяване на въстанието в Копривщица и Панагюрище", en: "Uprising proclaimed in Koprivshtitsa and Panagyurishte" },
    { date: "21.04.1876", bg: "Кървавото писмо — призив за въстание", en: "The Bloody Letter — call to rise" },
    { date: "05.1876", bg: "Кланетата в Батак, Перущица и Клисура", en: "Massacres in Batak, Perushtitsa, Klisura" },
    { date: "1877", bg: "Руско-турска освободителна война", en: "Russo-Turkish War of Liberation" },
    { date: "03.03.1878", bg: "Освобождение на България", en: "Liberation of Bulgaria" }
];

function applyLangStaticEls() {
    document.querySelectorAll('[data-bg]').forEach(el => {
        const value = currentLang === 'bg' ? el.getAttribute('data-bg') : el.getAttribute('data-en');
        if (value.includes('<')) el.innerHTML = value; else el.textContent = value;
    });
    document.getElementById('langBtnBg').classList.toggle('active', currentLang === 'bg');
    document.getElementById('langBtnEn').classList.toggle('active', currentLang === 'en');
    document.documentElement.lang = currentLang;
}

function switchLang(lang) {
    currentLang = lang;
    safeStorage.setItem('aprilLang', lang);
    applyLangStaticEls();
    renderTimeline();
   
    renderBars(latestCounts);
}

function toggleTheme() {
    isLightTheme = !isLightTheme;
    document.body.classList.toggle('light', isLightTheme);
    document.getElementById('themeBtn').textContent = isLightTheme ? '☀️' : '🌙';
    safeStorage.setItem('aprilTheme', isLightTheme ? 'light' : 'dark');
}

function renderTimeline() {
    const ul = document.getElementById('timelineList');
    ul.innerHTML = '';
    timelineEvents.forEach(ev => {
        const li = document.createElement('li');
        const text = currentLang === 'bg' ? ev.bg : ev.en;
        li.innerHTML = `<b>${ev.date}</b>${text}`;
        ul.appendChild(li);
    });
    document.getElementById('kpiEvents').textContent = timelineEvents.length;
}


let latestCounts = null;

function renderBars(data) {
    const container = document.getElementById('barsContainer');
    if (!data) {
        container.innerHTML = `<div class="empty">${currentLang === 'bg' ? 'Няма още записани прегледи.' : 'No views recorded yet.'}</div>`;
        return;
    }
    const entries = Object.entries(data).sort((a,b) => b[1] - a[1]);
    const max = Math.max(1, ...entries.map(e => e[1]));
    container.innerHTML = entries.map(([key, count]) => {
        const info = placeInfo[key];
        const name = info ? (currentLang === 'bg' ? info.bg : info.en) : key;
        const pct = Math.round((count / max) * 100);
        return `
            <div class="bar-row">
                <div class="name">${name}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${count > 0 ? pct : 2}%;opacity:${count > 0 ? 1 : 0.25}"></div></div>
                <div class="count">${count}</div>
            </div>`;
    }).join('');
}

async function loadStats() {
    try {
        const res = await fetch('/api/stats', { method: 'GET' });
        if (!res.ok) throw new Error('Request failed');
        const payload = await res.json();
        latestCounts = payload.counts || {};
        document.getElementById('kpiViews').textContent = payload.totalViews ?? 0;
        const updated = payload.updatedAt ? new Date(payload.updatedAt) : null;
        document.getElementById('viewsUpdated').textContent = updated
            ? (currentLang === 'bg' ? 'Обновено ' : 'Updated ') + updated.toLocaleTimeString(currentLang === 'bg' ? 'bg-BG' : 'en-GB')
            : '';
        renderBars(latestCounts);
    } catch (e) {
        document.getElementById('kpiViews').textContent = '—';
        const container = document.getElementById('barsContainer');
        container.innerHTML = `<div class="empty">${currentLang === 'bg' ? 'Не може да се свържат статистиките. Опитайте пак след деплой.' : 'Could not load stats. Try again after deploy.'}</div>`;
    }
}

window.addEventListener('load', () => {
    if (isLightTheme) {
        document.body.classList.add('light');
        document.getElementById('themeBtn').textContent = '☀️';
    }
    document.getElementById('kpiPlaces').textContent = Object.keys(placeInfo).length;
    applyLangStaticEls();
    renderTimeline();
    loadStats();
    setInterval(loadStats, 30000);
});
</script>
</body>
</html>
